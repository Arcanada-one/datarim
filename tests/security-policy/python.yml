# Caller-fixture: invokes the reusable security-audit workflow with the
# python stack profile. Drives `act --dryrun` for V-AC-9.
name: caller-python

on:
  workflow_dispatch:

jobs:
  audit:
    uses: ./.github/workflows/reusable-security-audit.yml
    with:
      stack: python
      audit_level: high
      accepted_risk_path: accepted-risk.yml
