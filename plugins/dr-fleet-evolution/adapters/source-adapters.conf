# source-adapters.conf — registered eval-dataset sources for the evolution loop.
#
# Format (one adapter per line):
#   <adapter-script>|<source-path>|<label>
#
# - <adapter-script> : path relative to the plugin root (plugins/dr-fleet-evolution).
# - <source-path>    : directory the adapter reads. May start with ~ (expanded by
#                      the loop) or ${VAR} (expanded from the environment).
# - <label>          : source name echoed into each record's "source" field.
#
# Lines starting with # and blank lines are ignored.
# Adding a line activates a new adapter on the next loop run (extension-point).
# The deferred audit-log adapter (a tracked follow-up) registers here once its
# redaction layer lands.

adapters/archive-adapter.sh|${DR_FLEET_ARCHIVE_DIR:-~/arcanada/documentation/archive}|archive
adapters/dr-dream-adapter.sh|${DR_FLEET_DREAM_DIR:-~/arcanada/datarim/reflections}|dr-dream
