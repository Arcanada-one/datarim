# fb-rules.yaml — Autonomous Agent Operating Rules (FB-1..FB-8) policy block.
# FB means Feedback Behaviour; it is unrelated to Facebook or Publisher.
# Canonical text: consumer ecosystem CLAUDE.md § Autonomous Agent Operating Rules Mandate.
# Source insight:  Projects/Datarim/datarim/insights/ (FB-rules autonomy research; see docs/evolution-log.md for provenance).
# Consumer: dev-tools/fb-policy-loader.sh (core) + plugins/dr-orchestrate/scripts/rules_loader.sh (shim).
# Location: dev-tools/rules/fb-rules.yaml (core path — see docs/evolution-log.md for provenance).
#
# Schema (separate from default.yaml prompt-pattern schema):
#   rules:
#     - rule_id: FB-N                    # FB-1..FB-8, exact case
#       title: <short label>             # ≤ 60 chars
#       enforcement_layer: <int 1-6>     # see CLAUDE.md § AAL Mandate target operating model
#       tier: <rule-based|subagent|escalation>
#       default_action: <auto|escalate|refuse>
#       reversibility_required: <bool>   # false where the rule is decision-only
#       audit_required: <bool>           # always true per Law 5 (Transparency)
#       conflicts_with_law: <int|null>   # Supreme Directive Law that takes precedence
#
# Loader contract: load_fb_policy() emits JSON array of policy entries; consumers
# (subagent_resolver.sh, escalation_backend.sh, audit_sink.sh) read this array
# to choose default_action / log audit reason / route escalations.
#
# This file is policy-config, not prompt-pattern config. The default.yaml prompt
# table is unchanged; rules_loader.sh load() and load_fb_policy() are independent
# entry points. Do not merge.

rules:
  - rule_id: FB-1
    title: "Research available solution options"
    enforcement_layer: 2
    tier: rule-based
    default_action: auto
    reversibility_required: false
    audit_required: true
    conflicts_with_law: null

  - rule_id: FB-2
    title: "Compare options for security and maintainability"
    enforcement_layer: 2
    tier: rule-based
    default_action: auto
    reversibility_required: false
    audit_required: true
    conflicts_with_law: null

  - rule_id: FB-3
    title: "Run a role-based consilium when needed"
    enforcement_layer: 4
    tier: subagent
    default_action: auto
    reversibility_required: false
    audit_required: true
    conflicts_with_law: null

  - rule_id: FB-4
    title: "Choose an option and record the reason"
    enforcement_layer: 2
    tier: rule-based
    default_action: auto
    reversibility_required: false
    audit_required: true
    conflicts_with_law: 5

  - rule_id: FB-5
    title: "Execute safely reversible work without the operator"
    enforcement_layer: 2
    tier: rule-based
    default_action: auto
    reversibility_required: true
    audit_required: true
    conflicts_with_law: 1

  - rule_id: FB-5a
    title: "Do not defer reversible work without an artifact"
    enforcement_layer: 2
    tier: rule-based
    default_action: auto
    reversibility_required: true
    audit_required: true
    conflicts_with_law: 1
    anti_deferral: true

  - rule_id: FB-6
    title: "Keep decisions reversible under uncertainty"
    enforcement_layer: 6
    tier: rule-based
    default_action: auto
    reversibility_required: true
    audit_required: true
    conflicts_with_law: 4

  - rule_id: FB-7
    title: "Provide correction and rollback after testing"
    enforcement_layer: 3
    tier: rule-based
    default_action: auto
    reversibility_required: true
    audit_required: true
    conflicts_with_law: 4

  - rule_id: FB-8
    title: "Escalate only genuinely blocking questions"
    enforcement_layer: 6
    tier: escalation
    default_action: escalate
    reversibility_required: false
    audit_required: true
    conflicts_with_law: null

# Hard-gated actions (NEVER auto-execute regardless of FB-5).
# Mirror of CLAUDE.md § Hard-gated actions; consumer compares planned action.kind.
hard_gated_actions:
  - prod_deploy
  - secret_rotation
  - irreversible_db_op
  - public_communication
  - finance_action
  - legal_action
  - force_push_main
  - git_history_delete
  - multi_user_visible_action
  # content_consilium_publish: hard-gated publish of consilium-selected content.
  # Requires explicit --publish flag. Dry-run is the default mode.
  # Enforced by: scripts/content_consilium_gate.sh.
  - content_consilium_publish

# Immutable Supreme-Directive floor. Per-space policy can never lift these.
always_gated_floor:
  - finance_action
  - legal_action
  - git_history_delete
  - force_push_drops_commits
  - irreversible_db_no_backup
  - supreme_directive_forbidden

# Runtime action kind → spaces/{name}/space.yml autonomy.policy key.
action_autonomy_map:
  feature_branch_push: feature_branch_push
  merge_main: merge_main
  prod_deploy: prod_deploy
  publish_public: publish_public
  public_communication: publish_public
  content_consilium_publish: publish_public
  public_package_release: publish_public
  secret_rotation: secret_rotation
  verify: verify
  cross_project_write: cross_project_write
  force_push: merge_main
  irreversible_db_op: prod_deploy

# Carve-out (set 2026-05-31): the public_package_release sub-case is autonomous
# for patch/minor ONLY when escalate=false (all fail-closed gates green). A major
# bump and any 0.x breaking change still escalate. Consumers comparing an
# action.kind of public_package_release MUST also read action.bump_level +
# action.escalate before treating it as gated. Canonical text lives in the
# consumer ecosystem mandate (autonomous-agents.md § Carve-out).
hard_gate_carve_outs:
  - id: public_package_release
    autonomous_when:
      bump_level_in: [patch, minor]
      escalate: false
    always_gated_when:
      bump_level: major
      zero_x_breaking: true
    second_backstop: github_conditional_environment   # release-auto vs release-manual
