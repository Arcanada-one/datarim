# Datarim project configuration template.
#
# Copy this file to one or both of:
#   ./datarim/config.yaml           — per-project (team-shared, git-tracked)
#   ~/.config/datarim/config.yaml   — per-user (XDG, gitignored)
#
# Per-project wins on conflict.
#
# Reference: skills/self-verification/SKILL.md § Peer Review Provider Resolution

peer_review:
  # Provider for Layer 2 peer-review in /dr-verify.
  #
  # Whitelist (enforced by ${DATARIM_RUNTIME:-$HOME/.claude}/dev-tools/resolve-peer-provider.sh):
  #   sonnet      — cross_claude_family mode (via Claude Code subagent dispatch)
  #   haiku       — cross_claude_family mode (200K context — verify PRD/plan size)
  #   none        — disables Layer 2 entirely (Layer 1 floor + Layer 3 only)
  #
  # External coworker providers (deepseek/moonshot/openrouter/groq) are forbidden
  # here: adversarial review, AC verification, and hidden-gap discovery stay on
  # the selected agent runtime, not on coworker.
  #
  # Unknown values → resolve-peer-provider.sh exits 1 (supply-chain mitigation).
  provider: sonnet

  # Model used when chain reaches cross-Claude-family subagent fallback.
  # Triggered when no provider is configured anywhere in the chain.
  #
  # Whitelist:
  #   sonnet  — default; 1M context; safe for large PRDs/plans
  #   haiku   — cheaper but 200K context; truncation risk on artifacts >200K tokens
  fallback_model: sonnet
