# Reusable workflow — spec-traceability gate (dr-lint over the dr-spec-rules
# registry). Advisory-first per docs/spec-traceability-rollout.md: the gate runs
# advisory during the transition window, then hard-scoped to changed artefacts
# (--scope git-diff). CI is the final verdict; the opt-in pre-commit sample
# (templates/pre-commit-spec-lint.sample) is fast feedback only. Both read the
# one registry (dev-tools/dr-spec-rules.yaml) and one mandatory-rule config.
#
# Call from another workflow:
#
#   jobs:
#     spec-traceability:
#       uses: Arcanada-one/datarim/.github/workflows/spec-traceability.yml@main
#       with:
#         task_id: TUNE-1234
#         advisory: true
#
name: spec-traceability

on:
  workflow_call:
    inputs:
      task_id:
        description: 'Task id whose PRD/plan/expectations graph to lint.'
        type: string
        required: true
      advisory:
        description: 'Advisory window — emit findings but never fail the job.'
        type: boolean
        required: false
        default: true
      scope:
        description: 'all | git-diff (limit hard gate to changed artefacts).'
        type: string
        required: false
        default: 'git-diff'
      datarim_ref:
        description: 'Datarim ref to checkout the validators from.'
        type: string
        required: false
        default: 'main'
  workflow_dispatch:
    inputs:
      task_id:
        description: 'Task id to lint'
        type: string
        required: true
      advisory:
        description: 'Advisory window'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  lint:
    name: spec-traceability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout Datarim validators
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: Arcanada-one/datarim
          ref: ${{ inputs.datarim_ref }}
          path: .datarim
          persist-credentials: false

      - name: Run dr-lint (spec-traceability)
        env:
          TASK_ID: ${{ inputs.task_id }}
          ADVISORY: ${{ inputs.advisory }}
          SCOPE: ${{ inputs.scope }}
        run: |
          set -uo pipefail
          args=(--task "$TASK_ID" --format json --scope "$SCOPE")
          [ "$ADVISORY" = "true" ] && args+=(--advisory)
          ./.datarim/dev-tools/dr-lint.sh "${args[@]}"
