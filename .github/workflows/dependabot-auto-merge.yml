name: dependabot-auto-merge

# Auto-merge Dependabot PRs once required checks pass.
#
# Scope: minor + patch updates auto-merge. Major bumps stay open for
# manual review (the action label is `version-update:semver-major`).
#
# Required checks are enforced by branch protection — this workflow
# just toggles auto-merge on the PR, so GitHub holds the merge until
# the checks pass.

on:
  pull_request_target:
    branches: [main]

permissions: {}

concurrency:
  group: dependabot-auto-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: enable-auto-merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@08eff52bf64351f401fb50d4972fa95b9f2c2d1b # v2.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable squash auto-merge on minor and patch updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
