name: dev-tools-lint
# TUNE-0091 — non-blocking dev-only lint gate.
# - bats-self-tests: BLOCKING. Linter's own bats suite must stay green.
# - linter-run:      WARNING-ONLY. Cross-root surfaces (sister site)
#                    are not checked out; warnings expected.

on:
  pull_request:
    paths:
      - 'commands/**'
      - 'skills/**'
      - 'agents/**'
      - 'docs/**'
      - 'CLAUDE.md'
      - 'README.md'
      - 'dev-tools/**'
      - '.github/workflows/dev-tools-lint.yml'

permissions:
  contents: read

concurrency:
  group: dev-tools-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bats-self-tests:
    name: bats self-tests (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Install bats
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends bats

      - name: Run dev-tools self-tests
        run: bats dev-tools/tests/doc-fanout-lint.bats

  linter-run:
    name: doc-fanout-lint run (warning-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Run linter against framework checkout
        run: |
          bash dev-tools/doc-fanout-lint.sh \
               --root . \
               --config dev-tools/.doc-fanout.yml \
               --allow-cross-root || \
          echo "::warning::doc-fanout-lint reported issues (cross-root surfaces are expected to be missing in single-repo CI checkout)"
