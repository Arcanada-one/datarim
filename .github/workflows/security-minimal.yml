name: security-minimal

# Minimal P1 gate (TUNE-0045): shellcheck + bats regression suite.
# Full gate (semgrep / bandit / trufflehog / actionlint / zizmor / osv-scanner)
# lives in security.yml (P2). gitleaks already runs there.

on:
  pull_request:
  push:
    branches: [main, "tune-*"]

permissions:
  contents: read

concurrency:
  group: security-minimal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck (severity=warning)
        run: |
          set -euo pipefail
          shellcheck --version
          mapfile -d '' files < <(find . -name '*.sh' -not -path './.git/*' -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no shell scripts found"
            exit 0
          fi
          shellcheck --severity=warning "${files[@]}"

  regression-bats:
    name: regression-bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run security regression tests
        run: bash tests/security/run-all.sh
