name: scorecard

# OpenSSF Scorecard: weekly score + on-demand runs publish to the
# OpenSSF dashboard. Push runs still upload SARIF, but skip dashboard
# publishing so external Fulcio/OIDC publish outages do not block releases.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: openssf-scorecard
    runs-on: ubuntu-latest
    permissions:
      # Required for publish_results to OpenSSF dashboard.
      id-token: write
      # Required to upload SARIF to code-scanning.
      security-events: write
      # Read-only repo access.
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ github.event_name != 'push' }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
