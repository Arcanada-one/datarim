name: release

# Datarim release workflow (TUNE-0050).
# Triggers on tags matching v*. Builds source tarball via `git archive`,
# generates CycloneDX SBOM via syft, signs both with cosign keyless OIDC,
# attests build provenance (SLSA L2) via actions/attest-build-provenance,
# publishes everything to GitHub Releases.
#
# Approach: Hybrid C — cosign sign-blob (portable verification) + GitHub
# native attestations (SLSA L2). End-user verify recipe lives in
# docs/release-verification.md.
#
# Tools install pattern (mirrors security.yml):
#   - cosign + syft → standalone binaries, sha256-verified.
#   - actions/checkout, actions/attest-build-provenance, softprops/action-gh-release
#     → SHA-pinned to commit.

on:
  push:
    tags: ['v*']

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  COSIGN_VERSION: v3.0.6
  COSIGN_SHA256: c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74
  SYFT_VERSION: v1.43.0
  SYFT_SHA256: 7b98251d2d08926bb5d4639b56b1f0996a58ef6667c5830e3fe3cd3ad5f4214a

jobs:
  # Major-gate backstop (TUNE-0351). Reads the bump level the agent stamped into
  # the annotated tag, re-classifies in CI (authoritative API-diff surface), and
  # takes max(stamped, ci) so the GitHub environment gate does not trust the
  # agent's stamp. The release job selects its environment from this output.
  classify:
    name: classify-bump
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      bump_level: ${{ steps.read.outputs.bump_level }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0           # full history — the CI re-classify walks a commit range
          persist-credentials: false
      - name: Read and re-classify bump from annotated tag
        id: read
        run: |
          set -euo pipefail
          # Bump level the agent stamped into the annotated tag message.
          msg="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          stamped="$(printf '%s\n' "$msg" | sed -n 's/^bump_level=//p' | head -1)"
          : "${stamped:=minor}"     # missing stamp => safe autonomous default
          # Re-run the classifier in CI (where API-diff tooling is pinned).
          ci="$(dev-tools/release-classify.sh --repo . --api-diff auto \
                  | sed -n 's/^bump_level=//p' | head -1)"
          : "${ci:=minor}"
          rank() { case "$1" in patch) echo 1;; minor) echo 2;; major) echo 3;; *) echo 0;; esac; }
          if [ "$(rank "$ci")" -ge "$(rank "$stamped")" ]; then final="$ci"; else final="$stamped"; fi
          echo "bump_level=${final}" >> "$GITHUB_OUTPUT"
          # Hard guard: CI says major but the tag stamped lower => abort (never
          # route a CI-detected major into release-auto).
          if [ "$ci" = "major" ] && [ "$stamped" != "major" ]; then
            echo "::error::CI classified MAJOR but the tag stamped '${stamped}' — aborting" >&2
            exit 1
          fi

  release:
    name: build-sign-attest-publish
    needs: [classify]
    runs-on: ubuntu-latest
    # Conditional environment (TUNE-0351): a major bump routes to release-manual
    # (required reviewer); patch/minor flows through release-auto (no reviewer).
    #
    # REQUIRED ENVIRONMENT POLICY (repo Settings → Environments, not in this file):
    # both `release-auto` and `release-manual` MUST allow deployments from the
    # `v*` tag pattern. This workflow triggers on tag pushes (`on: push: tags`),
    # and a tag is NOT a protected branch — so an environment whose deployment
    # branch policy is "Protected branches only" rejects every tagged release at
    # job start (~2s, no steps run). Set deployment_branch_policy to
    # custom_branch_policies and add a `v*` tag rule. Tracked for IaC by a
    # follow-up backlog task (see CHANGELOG / evolution-log).
    environment:
      name: ${{ (needs.classify.outputs.bump_level == 'major' && 'release-manual') || 'release-auto' }}
    permissions:
      contents: write       # required to create the GitHub Release
      id-token: write       # required for cosign keyless OIDC + attestations
      attestations: write   # required for actions/attest-build-provenance
    steps:
      - name: Validate tag format
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(rc|alpha|beta|test)[0-9]+)?$ ]]; then
            echo "::error::tag '$tag' does not match release format ^v\\d+\\.\\d+\\.\\d+(-(rc|alpha|beta|test)\\d+)?$"
            exit 1
          fi
          {
            echo "TAG=$tag"
            echo "VERSION=${tag#v}"
          } >> "$GITHUB_ENV"
          # Mark non-stable suffixes as prerelease.
          if [[ "$tag" =~ -(rc|alpha|beta|test)[0-9]+$ ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install cosign (verified binary)
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" -o /tmp/cosign
          echo "${COSIGN_SHA256}  /tmp/cosign" | sha256sum -c -
          sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign
          cosign version

      - name: Install syft (verified binary)
        run: |
          set -euo pipefail
          asset="syft_${SYFT_VERSION#v}_linux_amd64.tar.gz"
          curl -fsSL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${asset}" -o "/tmp/${asset}"
          echo "${SYFT_SHA256}  /tmp/${asset}" | sha256sum -c -
          tar -xzf "/tmp/${asset}" -C /tmp syft
          sudo install -m 0755 /tmp/syft /usr/local/bin/syft
          syft version

      - name: Build source tarball (deterministic)
        run: |
          set -euo pipefail
          tarball="datarim-${TAG}-source.tar.gz"
          # --no-name on gzip strips embedded timestamp; git archive uses commit date for mtimes.
          git archive --format=tar --prefix="datarim-${TAG}/" HEAD | gzip --no-name -6 > "$tarball"
          sha256sum "$tarball" > "${tarball}.sha256"
          ls -la "$tarball"*
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Generate SBOM (CycloneDX)
        run: |
          set -euo pipefail
          sbom="datarim-${TAG}-sbom.cdx.json"
          syft scan dir:. -o "cyclonedx-json=${sbom}"
          # Sanity: bomFormat must be CycloneDX, components array non-empty.
          jq -e '.bomFormat == "CycloneDX" and (.components | length > 0)' "$sbom" > /dev/null
          echo "SBOM=$sbom" >> "$GITHUB_ENV"

      - name: Cosign sign-blob (tarball + SBOM)
        run: |
          set -euo pipefail
          for f in "$TARBALL" "$SBOM"; do
            cosign sign-blob --bundle "${f}.cosign.bundle" --yes "$f"
            test -s "${f}.cosign.bundle"
          done

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.TARBALL }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          prerelease: ${{ env.IS_PRERELEASE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Verify this release before installing — see
            [docs/release-verification.md](https://github.com/Arcanada-one/datarim/blob/${{ env.TAG }}/docs/release-verification.md).
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
            ${{ env.TARBALL }}.cosign.bundle
            ${{ env.SBOM }}
            ${{ env.SBOM }}.cosign.bundle
