name: dr-orchestrate contract

on:
  push:
    paths:
      - 'plugins/dr-orchestrate/**'
      - '.github/workflows/dr-orchestrate-contract.yml'
  pull_request:
    paths:
      - 'plugins/dr-orchestrate/**'
      - '.github/workflows/dr-orchestrate-contract.yml'

permissions:
  contents: read

jobs:
  schemathesis:
    name: Schemathesis contract tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Python + schemathesis
        run: pip install schemathesis

      - name: Install socat (dr-orchestrate-server.sh dependency)
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends socat

      - name: Start dr-orchestrate bash server on ephemeral port
        working-directory: plugins/dr-orchestrate
        env:
          DR_ORCH_INBOUND_TOKEN: ${{ secrets.DR_ORCH_INBOUND_TOKEN || 'ci-test-token' }}
          DR_ORCH_DIR: ${{ github.workspace }}/plugins/dr-orchestrate
          DR_ORCH_PORT: 8090
        run: |
          # TUNE-0295 Phase C dropped the adnanh/webhook reference impl and
          # replaced it with the internal bash HTTP server. CI starts the
          # bash server on port 8090 so the OpenAPI base-URL contract
          # (http://127.0.0.1:8090) stays stable for Schemathesis.
          mkdir -p /tmp/dr-orch-ci
          nohup bash scripts/dr_orchestrate_server.sh \
            >/tmp/dr-orch-ci/server.out 2>/tmp/dr-orch-ci/server.err &
          server_pid=$!
          # Wait up to 15s for the listener to come up.
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${DR_ORCH_PORT}" >/dev/null 2>&1; then
              echo "server ready after ${i} probes (curl)"
              break
            fi
            if ss -tlnp 2>/dev/null | grep -q ":${DR_ORCH_PORT}\b"; then
              echo "server ready after ${i} probes (ss)"
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "server PID $server_pid exited before binding the port" >&2
              echo "--- stdout ---" >&2
              cat /tmp/dr-orch-ci/server.out >&2 || true
              echo "--- stderr ---" >&2
              cat /tmp/dr-orch-ci/server.err >&2 || true
              exit 1
            fi
            sleep 0.5
          done
          echo "WEBHOOK_PID=${server_pid}" >> "$GITHUB_ENV"

      - name: Run schemathesis
        working-directory: plugins/dr-orchestrate
        env:
          DR_ORCH_INBOUND_TOKEN: ${{ secrets.DR_ORCH_INBOUND_TOKEN || 'ci-test-token' }}
        run: |
          bash tests/contract/run-schemathesis.sh \
            --base-url http://127.0.0.1:8090 \
            --max-examples 20

      - name: Teardown reference impl
        if: always()
        run: |
          kill "$WEBHOOK_PID" 2>/dev/null || pkill -f "webhook.*8090" 2>/dev/null || true
