# Dependabot configuration.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Scope: keep GitHub Actions pinned to verified SHAs and surface
# vulnerabilities in any pip-managed tooling used by CI / pre-commit.
# The framework itself ships no runtime package manifests; this stays
# tight to CI/tooling surfaces.

version: 2

updates:
  # GitHub Actions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Pip-managed CI/lint tooling (bandit, semgrep, pre-commit, etc.).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      pip-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      pip-security:
        applies-to: security-updates
        patterns:
          - "*"
